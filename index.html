<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茄子代练 v2.0</title>
    <link rel="stylesheet" href="prototype-v2.3.css">
</head>
<body>
<div class="login-overlay" id="login-overlay">
  <div class="lgo">🍆</div>
  <h1>茄子代练</h1>
  <div class="sub">工作室SAAS管理平台</div>
  <div class="login-form">
    <div class="login-field"><input class="login-input" id="login-phone" type="tel" maxlength="11" placeholder="请输入手机号" autocomplete="off"></div>
    <div class="login-field" style="display:flex;gap:8px;"><input class="login-input" id="login-code" type="text" maxlength="4" placeholder="请输入验证码" autocomplete="off" style="flex:1;"><button class="login-sms-btn" id="login-sms-btn" onclick="sendLoginSms()">获取验证码</button></div>
    <div class="login-field"><button class="login-btn" onclick="doLogin()">登录</button></div>
  </div>
</div>
<div class="tree-sidebar" id="sidebar">
  <div class="logo"><div class="lgo">🍆</div>茄子代练</div>
  <div class="tree-menu" id="tree-menu"></div>
  <div class="footer"><div class="logout" onclick="doLogout()">🚪 退出登录</div></div>
</div>
<div class="main-wrap">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">工作台 / <span>首页</span></div>
    <div class="right"><a class="link" onclick="openProfileCenter()" style="font-size:var(--font-size);">👤 个人中心</a> &nbsp;|&nbsp; 2026-05-26 &nbsp;|&nbsp; <span id="top-role" class="role-badge op">平台运营</span></div>
  </div>
  <div class="content" id="content-area"></div>
</div>
<div class="ant-toast" id="toast"></div>
<div class="floating-ball" id="floating-ball" onclick="toggleRolePanel()" title="切换角色">🔄</div>
<div class="role-panel" id="role-panel">
  <div class="rp-header">切换角色视角</div>
  <div class="rp-body" id="role-list"></div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>
<script src="prototype-v2.3.js"></script>
</body>
</html>
